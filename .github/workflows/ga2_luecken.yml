name: EarnOS GA2 Nano-Lücken

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      laufzeit:
        description: 'Laufzeit in Minuten'
        default: '18'

concurrency:
  group: ga2-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: GA2 Nano-Lücken Scanner
        run: |
          node - <<'EOF'
          'use strict';
          const crypto = require('crypto');
          const http = require('http');

          const SERVER  = '46.224.239.18';
          const PORT    = 3001;
          const BATCH   = 500_000;   // kleinere Batches für Micro-Gaps
          const NODE_ID = 'GA2';
          const ZONE_SZ = Math.floor(0xFFFFFFFF / 32);

          // Laufzeit: 18min wenn manuell, sonst 9.5min (Cron alle 15min)
          const isManual = process.env.GITHUB_EVENT_NAME === 'workflow_dispatch';
          const LAUFZEIT = isManual ? 18 * 60 * 1000 : 9.5 * 60 * 1000;
          const START_TS = Date.now();

          function get(path) {
              return new Promise(resolve => {
                  http.get({ hostname: SERVER, port: PORT, path }, res => {
                      let raw = '';
                      res.on('data', c => raw += c);
                      res.on('end', () => { try { resolve(JSON.parse(raw)); } catch(_) { resolve(null); } });
                  }).on('error', () => resolve(null));
              });
          }

          function post(path, data) {
              return new Promise(resolve => {
                  const body = JSON.stringify(data);
                  const req = http.request({
                      hostname: SERVER, port: PORT, path, method: 'POST',
                      headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(body) }
                  }, res => { res.resume(); res.on('end', resolve); });
                  req.on('error', resolve);
                  req.write(body); req.end();
              });
          }

          function scanRange(header, from, count) {
              const h = Buffer.from(header);
              let bestBits = 0, bestNonce = -1;
              const survivors = [];
              const end = Math.min((from + count) >>> 0, 0xFFFFFFFF);
              for (let nonce = from >>> 0; nonce < end; nonce = (nonce + 1) >>> 0) {
                  h.writeUInt32BE(nonce, 76);
                  const buf = crypto.createHash('sha256').update(h).digest();
                  let bits = 0;
                  for (let j = 0; j < buf.length; j++) {
                      const b = buf[j];
                      if (b === 0) { bits += 8; continue; }
                      if (b & 0x80) break; if (b & 0x40) { bits += 1; break; }
                      if (b & 0x20) { bits += 2; break; } if (b & 0x10) { bits += 3; break; }
                      if (b & 0x08) { bits += 4; break; } if (b & 0x04) { bits += 5; break; }
                      if (b & 0x02) { bits += 6; break; } bits += 7; break;
                  }
                  if (bits > bestBits) { bestBits = bits; bestNonce = nonce; }
                  if (bits >= 20) survivors.push({ nonce, bits });
                  if (nonce === 0xFFFFFFFF) break;
              }
              return { bestBits, bestNonce, survivors: survivors.slice(0, 5) };
          }

          function buildHeader(job) {
              try {
                  const h = Buffer.alloc(80);
                  h.writeUInt32LE(parseInt(job.version, 16), 0);
                  Buffer.from(job.prevhash, 'hex').reverse().copy(h, 4);
                  const mk = crypto.createHash('sha256').update(Buffer.from(job.coinb1 + job.coinb2, 'hex')).digest();
                  mk.copy(h, 36);
                  h.writeUInt32LE(parseInt(job.ntime, 16), 68);
                  h.writeUInt32LE(parseInt(job.nbits, 16), 72);
                  return Array.from(h);
              } catch(_) { return null; }
          }

          async function main() {
              const modeStr = isManual ? '18min (manuell)' : '9.5min (cron)';
              console.log(`[${NODE_ID}] Nano-Lücken Scanner — ${modeStr}`);

              let totalScanned = 0;

              while (Date.now() - START_TS < LAUFZEIT) {
                  const [job, zones, ziel] = await Promise.all([
                      get('/api/job'),
                      get('/api/zones'),
                      get('/api/koordinator_ziel'),
                  ]);

                  if (!job || !job.prevhash) {
                      await new Promise(r => setTimeout(r, 3000));
                      continue;
                  }

                  const header = buildHeader(job);
                  if (!header) continue;

                  // Finde Zone mit Lücken: aktiv (C) aber cursor nicht am Ende
                  // Priorität: heiße Zonen (hohe bits) die noch nicht exhausted
                  const targets = [];
                  for (let z = 0; z < 32; z++) {
                      const info = (zones && (zones[z] || zones[String(z)])) || {};
                      if (info.status === 'O') continue;    // fertig
                      if (info.status === 'X') continue;    // leer bestätigt
                      const bits = info.bestBits || 0;
                      targets.push({ z, bits, status: info.status || '_' });
                  }

                  // Sortiere: heiße aktive Zonen zuerst
                  targets.sort((a, b) => b.bits - a.bits);

                  if (targets.length === 0) {
                      console.log(`[${NODE_ID}] Alle Zonen abgedeckt`);
                      await new Promise(r => setTimeout(r, 5000));
                      continue;
                  }

                  // Nimm die heißeste Zone, hole nächsten Cursor-Block
                  const target = targets[0];
                  const cursor = await get(`/api/cursor/${target.z}`);
                  const from = cursor && cursor.from != null ? cursor.from >>> 0 : (target.z * ZONE_SZ) >>> 0;

                  console.log(`[${NODE_ID}] Z${target.z} ${target.bits}b | Nano-Scan ab ${from}`);

                  const result = scanRange(header, from, BATCH);
                  totalScanned += BATCH;

                  // Ergebnis melden
                  await post('/api/result', {
                      zone: target.z, bestBits: result.bestBits,
                      bestNonce: result.bestNonce, scanned: BATCH, node: NODE_ID
                  });

                  // ≥ 25b → Schwarm trigger, Zone sperren
                  if (result.bestBits >= 25) {
                      console.log(`[${NODE_ID}] ★ NANO-HOTSPOT Z${target.z} ${result.bestBits}b → Schwarm + Sperre`);
                      await post('/api/zone_update', {
                          zone: target.z, status: 'C', depth: 3,
                          bestBits: result.bestBits, bestNonce: result.bestNonce,
                          hotspot: true, survivors: result.survivors, node: NODE_ID
                      });
                  }
                  // < 20b und Zone war schon C → als X markieren (leer, überspringen)
                  else if (result.bestBits < 20 && target.status === 'C') {
                      console.log(`[${NODE_ID}] Z${target.z} leer (${result.bestBits}b) → X`);
                      await post('/api/zone_update', {
                          zone: target.z, status: 'X', depth: 3,
                          bestBits: result.bestBits, hotspot: false, node: NODE_ID
                      });
                  }
              }

              const elapsed = Math.round((Date.now() - START_TS) / 1000);
              console.log(`[${NODE_ID}] Fertig — ${elapsed}s | ${totalScanned.toLocaleString()} Nonces gescannt`);

              await post('/api/result', {
                  zone: 0, bestBits: 0, bestNonce: -1,
                  scanned: totalScanned, node: NODE_ID,
                  summary: true, elapsed
              });
          }

          main().catch(e => { console.error(e); process.exit(1); });
          EOF
